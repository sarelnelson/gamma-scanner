<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0d1117">
<title>Gamma Scanner</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0d1117; color: #e6edf3; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
.login-box { background: #161b22; border: 1px solid #21262d; border-radius: 16px; padding: 40px; max-width: 360px; width: 100%; text-align: center; }
.login-box h1 { font-size: 24px; margin-bottom: 8px; }
.login-box .subtitle { color: #8b949e; font-size: 13px; margin-bottom: 28px; }
.login-box input { width: 100%; padding: 14px; border-radius: 8px; border: 1px solid #30363d; background: #0d1117; color: #e6edf3; font-size: 16px; margin-bottom: 16px; -webkit-appearance: none; }
.login-box input:focus { outline: none; border-color: #1f6feb; }
.login-box button { width: 100%; padding: 14px; border-radius: 8px; border: none; background: #1f6feb; color: #fff; font-size: 16px; font-weight: 600; cursor: pointer; }
.login-box button:hover { background: #388bfd; }
.login-box .error { color: #f85149; font-size: 13px; margin-top: 12px; display: none; }
.user-select { display: none; margin-top: 20px; }
.user-btn { width: 100%; padding: 16px; border-radius: 10px; border: 1px solid #30363d; background: #0d1117; color: #e6edf3; font-size: 18px; font-weight: 600; cursor: pointer; margin-bottom: 10px; text-align: left; display: flex; align-items: center; gap: 12px; }
.user-btn:hover { border-color: #1f6feb; background: #161b22; }
.user-btn .avatar { width: 36px; height: 36px; border-radius: 50%; background: #1f6feb; display: flex; align-items: center; justify-content: center; font-size: 16px; }
</style>
</head>
<body>
<div class="login-box">
  <h1>🎯 Gamma Scanner</h1>
  <p class="subtitle">Enter password to continue</p>
  
  <div id="password-step">
    <input type="password" id="password" placeholder="Password" autofocus>
    <button onclick="checkPassword()">Enter</button>
    <p class="error" id="error">Incorrect password</p>
  </div>
  
  <div class="user-select" id="user-select">
    <p style="color:#8b949e;font-size:13px;margin-bottom:16px;">Select account:</p>
  </div>
</div>

<script>
document.getElementById('password').addEventListener('keypress', function(e) {
  if (e.key === 'Enter') checkPassword();
});

async function checkPassword() {
  const pw = document.getElementById('password').value;
  const resp = await fetch('/api/auth/login', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({password: pw})
  });
  const data = await resp.json();
  if (data.success) {
    // Store token
    localStorage.setItem('gamma_token', data.token);
    // Show user selection
    document.getElementById('password-step').style.display = 'none';
    const sel = document.getElementById('user-select');
    sel.style.display = 'block';
    sel.innerHTML = '<p style="color:#8b949e;font-size:13px;margin-bottom:16px;">Select account:</p>' +
      data.users.map(u => `
        <button class="user-btn" onclick="selectUser('${u.id}')">
          <span class="avatar">${u.name[0]}</span>
          <span>${u.name}</span>
        </button>
      `).join('');
  } else {
    document.getElementById('error').style.display = 'block';
  }
}

function selectUser(userId) {
  localStorage.setItem('gamma_user', userId);
  window.location.href = '/dashboard';
}

// If already logged in, skip to user select or dashboard
const token = localStorage.getItem('gamma_token');
const user = localStorage.getItem('gamma_user');
if (token && user) {
  window.location.href = '/dashboard';
}
</script>
</body>
</html>
